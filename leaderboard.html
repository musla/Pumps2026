<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pumps 2026 – Žebříček</title>
<style>
  :root {
    --blue: #1a3a5c;
    --blue-light: #2a5a8c;
    --gold: #f0a500;
    --green: #2d8a4e;
    --bg: #f4f7fb;
    --card: #fff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e2e8f0;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--blue);
    color: #fff;
    padding: 20px 24px 16px;
    text-align: center;
  }
  header h1 { font-size: 1.6rem; font-weight: 800; }
  header .sub { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }

  main { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }

  .pot-banner {
    text-align: center;
    background: linear-gradient(135deg, var(--blue) 0%, var(--blue-light) 100%);
    color: #fff;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
  }
  .pot-banner .amount {
    font-size: 2.2rem;
    font-weight: 900;
    color: var(--gold);
    letter-spacing: -1px;
  }
  .pot-banner .lbl { font-size: 0.82rem; opacity: 0.8; margin-top: 2px; }

  .scoring-info {
    background: #f0f7ff;
    border: 1.5px solid #cce0ff;
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.83rem;
    color: #1a3a5c;
    margin-bottom: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .scoring-info span { display: flex; align-items: center; gap: 5px; }

  .crew-card {
    display: flex;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .crew-card:last-child { border-bottom: none; }

  .rank {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    font-size: 1rem;
    flex-shrink: 0;
    background: #e9ecef;
    color: var(--muted);
  }
  .rank.r1 { background: #ffd700; color: #7a5200; }
  .rank.r2 { background: #c0c0c0; color: #3a3a3a; }
  .rank.r3 { background: #cd7f32; color: #fff; }

  .crew-info { flex: 1; min-width: 0; }
  .crew-name { font-weight: 700; font-size: 0.97rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .crew-meta { font-size: 0.78rem; color: var(--muted); margin-top: 2px; display: flex; gap: 10px; flex-wrap: wrap; }

  .crew-pts { text-align: right; flex-shrink: 0; }
  .pts-num { font-size: 1.6rem; font-weight: 900; color: var(--blue); line-height: 1; }
  .pts-lbl { font-size: 0.7rem; color: var(--muted); }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin-top: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue-light), var(--gold));
    border-radius: 99px;
    transition: width .5s ease;
  }

  .spinner {
    display: flex;
    justify-content: center;
    padding: 60px;
  }
  .spin {
    width: 40px; height: 40px;
    border: 4px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: s .8s linear infinite;
  }
  @keyframes s { to { transform: rotate(360deg); } }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--blue);
    font-size: 0.88rem;
    font-weight: 600;
    text-decoration: none;
    margin-bottom: 16px;
    padding: 8px 14px;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .back-btn:hover { background: var(--bg); }

  .refresh-btn {
    float: right;
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.82rem;
    cursor: pointer;
    color: var(--muted);
    font-weight: 600;
  }
  .refresh-btn:hover { background: var(--bg); }

  .empty { text-align: center; padding: 30px; color: var(--muted); font-size: 0.9rem; }
  .updated { font-size: 0.75rem; color: var(--muted); text-align: right; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <h1>🏆 Žebříček</h1>
  <div class="sub">Pumps 2026 – Tipovačka</div>
</header>

<main>
  <a class="back-btn" href="javascript:history.back()">← Zpět</a>

  <div id="app">
    <div class="spinner"><div class="spin"></div></div>
  </div>
</main>

<script src="config.js"></script>
<script>
async function load() {
  const app = document.getElementById('app');

  const data = await fetch(CFG.api + '?action=board').then(r => r.json());

  if (data.error) {
    app.innerHTML = `<div style="color:red;padding:20px">${data.error}</div>`;
    return;
  }

  const { board, pot } = data;
  const maxPts = board[0]?.pts || 1;

  let potHtml = '';
  if (pot > 0) {
    potHtml = `<div class="pot-banner">
      <div class="amount">${pot.toLocaleString('cs-CZ')} Kč</div>
      <div class="lbl">celková výše sázek v potu</div>
    </div>`;
  }

  const scoringHtml = `<div class="scoring-info">
    <strong>Bodování:</strong>
    <span>🎯 Přesně = 3 body</span>
    <span>±1 místo = 1 bod</span>
    <span>Jinak = 0 bodů</span>
  </div>`;

  const rows = board.map((c, i) => {
    const rank = i + 1;
    const rankCls = rank <= 3 ? 'r' + rank : '';
    const pct = maxPts > 0 ? Math.round((c.pts / maxPts) * 100) : 0;

    return `<div class="crew-card">
      <div class="rank ${rankCls}">${rank}</div>
      <div class="crew-info">
        <div class="crew-name">${c.name}</div>
        <div class="crew-meta">
          <span>⛵ ${c.boat}</span>
          ${c.bet ? `<span>💰 ${c.bet.toLocaleString('cs-CZ')} Kč</span>` : ''}
          ${c.tipped > 0 ? `<span>🎯 ${c.exact}× přesně</span>` : '<span>žádné tipy</span>'}
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div class="crew-pts">
        <div class="pts-num">${c.pts}</div>
        <div class="pts-lbl">bodů</div>
      </div>
    </div>`;
  }).join('');

  const now = new Date();
  const timeStr = now.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });

  app.innerHTML = potHtml + scoringHtml + `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <strong style="font-size:.95rem;color:var(--blue)">Průběžné pořadí</strong>
        <button class="refresh-btn" onclick="location.reload()">↻ Obnovit</button>
      </div>
      <div class="updated">Aktualizováno v ${timeStr}</div>
      ${board.length === 0 ? '<div class="empty">Zatím žádná data.</div>' : rows}
    </div>`;
}

load();
</script>
</body>
</html>
