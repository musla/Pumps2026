<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛵ Pumps 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style><?!= include('styles') ?></style>
</head>
<body>

<header class="hdr">
  <span class="hdr-icon">⛵</span>
  <h1>Pumps 2026</h1>
  <div class="sub">Tipovačka regaty</div>
  <div class="wave-sep">
    <svg viewBox="0 0 1440 54" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,27 C240,52 480,2 720,27 C960,52 1200,2 1440,27 L1440,54 L0,54 Z" fill="#ebf4f9"/>
    </svg>
  </div>
</header>

<div id="crew-strip" class="crew-strip hidden">
  <div>
    <div class="crew-nm" id="el-name"></div>
    <div class="crew-bt" id="el-boat"></div>
  </div>
  <div id="el-bet" class="bet-pill hidden"></div>
</div>

<main>
  <div id="app">
    <div class="spin-wrap"><div class="spinner"></div><span>Načítám…</span></div>
  </div>
</main>

<script>
const TOKEN = '<?= initToken ?>';

const $ = id => document.getElementById(id);
const render = html => { $('app').innerHTML = html; };

function chipHtml(pts) {
  if (pts === null || pts === undefined) return '<span class="chip wait">čeká se</span>';
  if (pts === 3) return '<span class="chip exact">🎯 Přesně! +3&thinsp;b</span>';
  if (pts === 1) return '<span class="chip near">±1 místo +1&thinsp;b</span>';
  return '<span class="chip miss">0 bodů</span>';
}

function showHeader(crew) {
  $('el-name').textContent = crew.name;
  $('el-boat').textContent = '⛵ ' + crew.boat;
  $('crew-strip').classList.remove('hidden');
  if (crew.bet) {
    const el = $('el-bet');
    el.textContent = Number(crew.bet).toLocaleString('cs-CZ') + ' Kč';
    el.classList.remove('hidden');
  }
}

function init() {
  if (!TOKEN) {
    render(`<div class="err-box">
      <div class="ico">⚓</div>
      <h3>Odkaz není platný</h3>
      <p>Použij odkaz, který jsi dostal od organizátora regaty.</p>
    </div>`);
    return;
  }

  const today = new Date().toISOString().substring(0, 10);

  google.script.run
    .withSuccessHandler(data => {
      if (data.error) {
        render(`<div class="err-box"><div class="ico">🌊</div><h3>Chyba</h3><p>${data.error}</p></div>`);
        return;
      }
      showHeader(data.crew);
      data.crew.bet ? renderMain(data) : renderBetForm(data.crew);
    })
    .withFailureHandler(err => {
      render(`<div class="err-box"><div class="ico">🌊</div><h3>Chyba spojení</h3><p>${err.message}</p></div>`);
    })
    .getCrewTips(TOKEN, today);
}

/* ── Bet form ─────────────────────────────────────────────────────── */
function renderBetForm(crew) {
  render(`
    <div class="bet-callout">
      <div class="ico">💰</div>
      <h2>Zadej svoji sázku</h2>
      <p>Vítej, <strong>${crew.name}</strong>!<br>
         Než začneš tipovat, zadej výši své sázky.<br>
         <em>Částku <strong>nelze</strong> po potvrzení změnit.</em></p>
      <div class="bet-row">
        <input type="number" id="bet-in" min="1" placeholder="Kč" autofocus />
        <button class="btn btn-gold" onclick="submitBet()">Potvrdit</button>
      </div>
      <div id="bet-msg" class="alert err hidden"></div>
    </div>
  `);
}

function submitBet() {
  const val = $('bet-in').value;
  if (!val || +val <= 0) { showAlert('bet-msg', 'Zadej kladnou částku.'); return; }
  const btn = document.querySelector('.btn-gold');
  btn.disabled = true; btn.textContent = '…';

  google.script.run
    .withSuccessHandler(res => {
      if (res.error) { showAlert('bet-msg', res.error); btn.disabled = false; btn.textContent = 'Potvrdit'; }
      else location.reload();
    })
    .withFailureHandler(err => { showAlert('bet-msg', err.message); btn.disabled = false; })
    .setBet(TOKEN, val);
}

/* ── Main view ────────────────────────────────────────────────────── */
function renderMain(data) {
  const { canTip, nowHour, races } = data;

  /* status banner */
  let statusHtml;
  if (canTip) {
    const now = new Date();
    const sec = (12 * 3600) - (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds());
    const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
    statusHtml = `<div class="status open">
      <div class="dot g"></div>
      <span>Tipování otevřeno · zavírá se za <strong id="cdwn">${h ? h + 'h ' : ''}${m}m</strong></span>
    </div>`;
  } else {
    statusHtml = `<div class="status closed">
      <div class="dot r"></div>
      <span>Tipování uzavřeno (po 12:00) · výsledky přijdou brzy</span>
    </div>`;
  }

  /* races */
  let racesHtml;
  if (!races.length) {
    racesHtml = `<div class="empty">
      <div class="ico">${nowHour < 10 ? '🕙' : '🌊'}</div>
      <p>${nowHour < 10 ? 'Admin zadá počet rozjízd do 10:00.' : 'Dnes nejsou naplánované žádné rozjízdy.'}</p>
    </div>`;
  } else {
    racesHtml = races.map(({ race, tip, result, points }) => {
      const opts = ['<option value="">— vyber pořadí —</option>',
        ...Array.from({ length: 16 }, (_, i) => i + 1)
          .map(n => `<option value="${n}"${tip === n ? ' selected' : ''}>${n}. místo</option>`)
      ].join('');

      const resLine = result != null
        ? `<div class="res-info">
             <span><span class="lbl">Tipoval jsi: </span><strong>${tip ?? '—'}. místo</strong></span>
             <span><span class="lbl">Výsledek: </span><strong>${result}. místo</strong></span>
           </div>`
        : tip != null
          ? `<div class="res-info"><span><span class="lbl">Tipoval jsi: </span><strong>${tip}. místo</strong></span></div>`
          : '';

      return `<div class="race-item">
        <div class="race-hdr">
          <span class="race-num">Rozjízda ${race.num}</span>
          ${chipHtml(points)}
        </div>
        <div class="pos-row">
          <span class="pos-lbl">Tvoje pořadí:</span>
          <select class="pos-sel" id="s${race.id}" onchange="saveTip('${race.id}',this)" ${canTip ? '' : 'disabled'}>
            ${opts}
          </select>
          <span class="save-ind" id="ind${race.id}"></span>
        </div>
        ${resLine}
      </div>`;
    }).join('');
  }

  /* score */
  const pts   = races.reduce((s, r) => s + (r.points || 0), 0);
  const tipped = races.filter(r => r.tip != null).length;
  const exact  = races.filter(r => r.points === 3).length;

  render(`
    <a href="?page=leaderboard" class="nav-link">🏆 Celkový žebříček →</a>
    ${statusHtml}
    <div class="card">
      <div class="card-title">⛵ Dnešní rozjízdy</div>
      ${racesHtml}
    </div>
    <div class="card">
      <div class="card-title">📊 Skóre za dnešek</div>
      <div class="score-grid">
        <div class="score-cell"><div class="score-n">${pts}</div><div class="score-l">bodů</div></div>
        <div class="score-cell"><div class="score-n">${tipped}</div><div class="score-l">tipů</div></div>
        <div class="score-cell"><div class="score-n">${exact}</div><div class="score-l">přesně</div></div>
      </div>
    </div>
  `);

  if (canTip) startCountdown();
}

/* ── Save tip ─────────────────────────────────────────────────────── */
function saveTip(raceId, sel) {
  if (!sel.value) return;
  const ind = $('ind' + raceId);
  ind.textContent = '…'; ind.style.color = 'var(--muted)';
  sel.disabled = true;

  google.script.run
    .withSuccessHandler(res => {
      sel.disabled = false;
      if (res.error) { ind.textContent = '✗ ' + res.error; ind.style.color = 'var(--red)'; }
      else { ind.textContent = '✓ Uloženo'; ind.style.color = 'var(--green)'; setTimeout(() => ind.textContent = '', 2500); }
    })
    .withFailureHandler(() => { sel.disabled = false; ind.textContent = '✗'; ind.style.color = 'var(--red)'; })
    .setTip(TOKEN, raceId, sel.value);
}

/* ── Countdown ────────────────────────────────────────────────────── */
function startCountdown() {
  setInterval(() => {
    const el = $('cdwn'); if (!el) return;
    const now = new Date();
    const s = (12 * 3600) - (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds());
    if (s <= 0) { location.reload(); return; }
    const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
    el.textContent = h ? `${h}h ${m}m` : `${m}m ${String(ss).padStart(2,'0')}s`;
  }, 1000);
}

/* ── Utils ────────────────────────────────────────────────────────── */
function showAlert(id, msg) {
  const el = $(id);
  el.textContent = msg;
  el.classList.remove('hidden');
}

init();
</script>
</body>
</html>
