<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛵ Pumps 2026 – Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
<?!= include('styles') ?>

/* Admin extras */
.login-wrap { max-width: 380px; margin: 40px auto 0; }
.admin-badge {
  display: inline-block;
  background: var(--gold);
  color: var(--deep);
  font-weight: 800;
  font-size: .75rem;
  padding: 3px 12px;
  border-radius: 99px;
  letter-spacing: .5px;
}
</style>
</head>
<body>

<header class="hdr">
  <span class="hdr-icon">🧭</span>
  <h1>Pumps 2026</h1>
  <div class="sub"><span class="admin-badge">ADMIN PANEL</span></div>
  <div class="wave-sep">
    <svg viewBox="0 0 1440 54" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,27 C240,52 480,2 720,27 C960,52 1200,2 1440,27 L1440,54 L0,54 Z" fill="#ebf4f9"/>
    </svg>
  </div>
</header>

<main>
  <!-- LOGIN -->
  <div id="login-view">
    <div class="login-wrap card" style="margin-top:10px">
      <div class="card-title">🔐 Přihlášení</div>
      <div class="field" style="margin-bottom:12px">
        <label>Admin klíč</label>
        <input type="password" id="key-in" placeholder="Heslo" onkeydown="if(event.key==='Enter')login()" />
      </div>
      <button class="btn" onclick="login()">Přihlásit se →</button>
      <div id="login-err" class="alert err hidden" style="margin-top:8px"></div>
    </div>
  </div>

  <!-- PANEL (hidden until login) -->
  <div id="panel-view" class="hidden">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('races',this)">⛵ Rozjízdy</button>
      <button class="tab" onclick="switchTab('results',this)">📋 Výsledky</button>
      <button class="tab" onclick="switchTab('board',this)">🏆 Žebříček</button>
    </div>

    <!-- RACES -->
    <div id="tab-races" class="tab-pane active">
      <div class="card">
        <div class="card-title">⛵ Nastavit rozjízdy (do 10:00)</div>
        <div class="row">
          <div class="field"><label>Datum</label><input type="date" id="race-date" /></div>
          <div class="field"><label>Počet rozjízd</label><input type="number" id="race-cnt" min="1" max="10" value="3" /></div>
          <button class="btn" onclick="setRaces()">Uložit</button>
        </div>
        <div id="races-msg"></div>
      </div>
    </div>

    <!-- RESULTS -->
    <div id="tab-results" class="tab-pane">
      <div class="card">
        <div class="card-title">📋 Zadat výsledky</div>
        <div class="row">
          <div class="field"><label>Datum</label><input type="date" id="res-date" /></div>
          <button class="btn" onclick="loadDay()">Načíst</button>
        </div>
        <div id="results-area"></div>
      </div>
    </div>

    <!-- BOARD -->
    <div id="tab-board" class="tab-pane">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="card-title" style="margin:0">🏆 Průběžné pořadí</div>
          <button class="btn btn-outline btn-sm" onclick="loadBoard()">↻ Obnovit</button>
        </div>
        <div id="board-area"><p style="color:var(--muted);font-size:.88rem">Přepni na záložku pro načtení…</p></div>
      </div>
    </div>
  </div>
</main>

<script>
let KEY = '';
const $ = id => document.getElementById(id);
const today = () => new Date().toISOString().substring(0,10);

function showMsg(id, text, type) {
  const el = $(id); if (!el) return;
  el.textContent = text;
  el.className = 'alert ' + (type || '');
  el.classList.remove('hidden');
}

/* ── Login ────────────────────────────────────────────────────────── */
function login() {
  const key = $('key-in').value.trim();
  if (!key) return;

  google.script.run
    .withSuccessHandler(data => {
      if (data.error) { showMsg('login-err', data.error, 'err'); return; }
      KEY = key;
      $('login-view').classList.add('hidden');
      $('panel-view').classList.remove('hidden');
      $('race-date').value = today();
      $('res-date').value  = today();
    })
    .withFailureHandler(err => showMsg('login-err', err.message, 'err'))
    .adminGetDayData(key, today());
}

/* ── Tabs ─────────────────────────────────────────────────────────── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  $('tab-' + name).classList.add('active');
  if (name === 'board')   loadBoard();
  if (name === 'results') loadDay();
}

/* ── Set races ────────────────────────────────────────────────────── */
function setRaces() {
  const date  = $('race-date').value;
  const count = +$('race-cnt').value;
  if (!date || !count) { showMsg('races-msg', 'Vyplň datum a počet.', 'err'); return; }
  showMsg('races-msg', 'Ukládám…', '');

  google.script.run
    .withSuccessHandler(res => {
      if (res.error) showMsg('races-msg', res.error, 'err');
      else showMsg('races-msg', `✓ Nastaveno ${res.count} rozjízd na ${date}`, 'ok');
    })
    .withFailureHandler(err => showMsg('races-msg', err.message, 'err'))
    .adminSetRaces(KEY, date, count);
}

/* ── Load day data ────────────────────────────────────────────────── */
function loadDay() {
  const date = $('res-date').value;
  if (!date) return;
  const area = $('results-area');
  area.innerHTML = '<div class="spin-wrap" style="padding:20px"><div class="spinner"></div></div>';

  google.script.run
    .withSuccessHandler(data => {
      if (data.error) { area.innerHTML = `<div class="alert err">${data.error}</div>`; return; }
      renderResults(data, area);
    })
    .withFailureHandler(err => { area.innerHTML = `<div class="alert err">${err.message}</div>`; })
    .adminGetDayData(KEY, date);
}

function renderResults(data, area) {
  if (!data.races.length) {
    area.innerHTML = '<div class="empty" style="padding:20px 0"><div class="ico">⛵</div><p>Žádné rozjízdy. Nastav je v záložce Rozjízdy.</p></div>';
    return;
  }

  let html = '';
  data.races.forEach(race => {
    html += `<h3 style="margin:16px 0 8px;font-size:.9rem;color:var(--navy);font-weight:700">
               Rozjízda ${race.num}
             </h3>`;
    html += `<div style="overflow-x:auto"><table class="adm-tbl"><thead><tr>
      <th>Posádka</th><th>Loď</th><th>Pořadí</th><th></th>
    </tr></thead><tbody>`;

    data.crews.forEach(crew => {
      const existing = data.results.find(r => r.race === race.id && r.crew === crew.id);
      const hasTip   = data.tips.some(t => t.race === race.id && t.crew === crew.id);
      const opts = ['<option value="">—</option>',
        ...Array.from({length:16},(_,i)=>i+1)
          .map(n => `<option value="${n}"${existing?.pos===n?' selected':''}>${n}.</option>`)
      ].join('');

      html += `<tr>
        <td><strong>${crew.name}</strong>${hasTip?'<span class="tip-badge">✓ tip</span>':''}</td>
        <td style="color:var(--muted)">${crew.boat}</td>
        <td><select id="r-${race.id}-${crew.id}">${opts}</select></td>
        <td>
          <button class="btn btn-sm" onclick="saveResult('${race.id}','${crew.id}')">Uložit</button>
          <span id="rm-${race.id}-${crew.id}" style="font-size:.78rem;margin-left:4px"></span>
        </td>
      </tr>`;
    });
    html += '</tbody></table></div>';
  });

  area.innerHTML = html;
}

function saveResult(raceId, crewId) {
  const pos = +$(`r-${raceId}-${crewId}`).value;
  const msgEl = $(`rm-${raceId}-${crewId}`);
  if (!pos) { msgEl.textContent = 'Vyber pořadí'; msgEl.style.color='var(--red)'; return; }
  msgEl.textContent = '…'; msgEl.style.color = 'var(--muted)';

  google.script.run
    .withSuccessHandler(res => {
      if (res.error) { msgEl.textContent = '✗ ' + res.error; msgEl.style.color='var(--red)'; }
      else { msgEl.textContent = '✓'; msgEl.style.color='var(--green)'; }
    })
    .withFailureHandler(err => { msgEl.textContent='✗'; msgEl.style.color='var(--red)'; })
    .adminSetResult(KEY, raceId, crewId, pos);
}

/* ── Leaderboard ──────────────────────────────────────────────────── */
function loadBoard() {
  const area = $('board-area');
  area.innerHTML = '<div class="spin-wrap" style="padding:20px"><div class="spinner"></div></div>';

  google.script.run
    .withSuccessHandler(data => {
      if (data.error) { area.innerHTML = `<div class="alert err">${data.error}</div>`; return; }
      renderBoard(data, area);
    })
    .withFailureHandler(err => { area.innerHTML = `<div class="alert err">${err.message}</div>`; })
    .getLeaderboardData();
}

function renderBoard(data, area) {
  const max = data.board[0]?.pts || 1;
  const potHtml = data.pot > 0
    ? `<div class="pot-banner" style="margin-bottom:14px">
         <div class="pot-amt">${data.pot.toLocaleString('cs-CZ')} Kč</div>
         <div class="pot-lbl">celková výše sázek</div>
       </div>` : '';

  const rows = data.board.map((c, i) => {
    const rank = i + 1;
    const cls  = rank <= 3 ? ' r' + rank : '';
    const pct  = Math.round((c.pts / max) * 100);
    return `<div class="lb-item">
      <div class="lb-rank${cls}">${rank}</div>
      <div class="lb-info">
        <div class="lb-name">${c.name}</div>
        <div class="lb-meta">⛵ ${c.boat}${c.bet ? ' · 💰 ' + Number(c.bet).toLocaleString('cs-CZ') + ' Kč' : ''}</div>
        <div class="progress"><div class="progress-f" style="width:${pct}%"></div></div>
      </div>
      <div class="lb-right">
        <div class="lb-pts">${c.pts}</div>
        <div class="lb-pts-l">bodů</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${c.exact}× přesně</div>
      </div>
    </div>`;
  }).join('');

  area.innerHTML = potHtml + (data.board.length ? rows : '<div class="empty"><div class="ico">⚓</div><p>Zatím žádná data.</p></div>');
}
</script>
</body>
</html>
