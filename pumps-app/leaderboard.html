<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛵ Pumps 2026 – Žebříček</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style><?!= include('styles') ?></style>
</head>
<body>

<header class="hdr">
  <span class="hdr-icon">🏆</span>
  <h1>Žebříček</h1>
  <div class="sub">Pumps 2026 · Tipovačka</div>
  <div class="wave-sep">
    <svg viewBox="0 0 1440 54" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,27 C240,52 480,2 720,27 C960,52 1200,2 1440,27 L1440,54 L0,54 Z" fill="#ebf4f9"/>
    </svg>
  </div>
</header>

<main>
  <div id="app">
    <div class="spin-wrap"><div class="spinner"></div><span>Načítám žebříček…</span></div>
  </div>
</main>

<script>
function load() {
  google.script.run
    .withSuccessHandler(render)
    .withFailureHandler(err => {
      document.getElementById('app').innerHTML =
        `<div class="err-box"><div class="ico">🌊</div><h3>Chyba</h3><p>${err.message}</p></div>`;
    })
    .getLeaderboardData();
}

function render(data) {
  const app = document.getElementById('app');
  if (data.error) {
    app.innerHTML = `<div class="err-box"><div class="ico">🌊</div><h3>Chyba</h3><p>${data.error}</p></div>`;
    return;
  }

  const { board, pot } = data;
  const max = board[0]?.pts || 1;
  const now = new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });

  const potHtml = pot > 0 ? `
    <div class="pot-banner">
      <div class="pot-amt">${pot.toLocaleString('cs-CZ')} Kč</div>
      <div class="pot-lbl">celková výše sázek v potu</div>
    </div>` : '';

  const legend = `
    <div class="legend">
      <strong>Bodování:</strong>
      <span>🎯 Přesné místo = <strong>3 body</strong></span>
      <span>±1 místo = <strong>1 bod</strong></span>
      <span>Jinak = <strong>0 bodů</strong></span>
    </div>`;

  const rows = board.map((c, i) => {
    const rank = i + 1;
    const cls  = rank <= 3 ? ' r' + rank : '';
    const pct  = Math.round((c.pts / max) * 100);
    return `<div class="lb-item">
      <div class="lb-rank${cls}">${rank}</div>
      <div class="lb-info">
        <div class="lb-name">${c.name}</div>
        <div class="lb-meta">
          ⛵ ${c.boat}
          ${c.bet ? `&nbsp;·&nbsp;💰 ${Number(c.bet).toLocaleString('cs-CZ')} Kč` : ''}
          ${c.tipped > 0 ? `&nbsp;·&nbsp;🎯 ${c.exact}× přesně` : ''}
        </div>
        <div class="progress"><div class="progress-f" style="width:${pct}%"></div></div>
      </div>
      <div class="lb-right">
        <div class="lb-pts">${c.pts}</div>
        <div class="lb-pts-l">bodů</div>
        <div style="font-size:.7rem;color:var(--muted);margin-top:1px">${c.tipped} tipů</div>
      </div>
    </div>`;
  }).join('');

  app.innerHTML = potHtml + legend + `
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="card-title" style="margin:0">Průběžné pořadí</div>
        <button class="btn btn-outline btn-sm" onclick="load()">↻</button>
      </div>
      <div style="font-size:.72rem;color:var(--muted);margin-bottom:10px;text-align:right">Aktualizováno ${now}</div>
      ${board.length
        ? rows
        : '<div class="empty"><div class="ico">⚓</div><p>Tipování právě začíná, žádná data zatím nejsou.</p></div>'}
    </div>`;
}

load();
</script>
</body>
</html>
