<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pumps 2026 – Tipovačka</title>
<style>
  :root {
    --blue: #1a3a5c;
    --blue-light: #2a5a8c;
    --gold: #f0a500;
    --green: #2d8a4e;
    --red: #c0392b;
    --bg: #f4f7fb;
    --card: #fff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e2e8f0;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--blue);
    color: #fff;
    padding: 20px 24px 16px;
    text-align: center;
  }
  header h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.5px; }
  header .sub { font-size: 0.85rem; opacity: 0.7; margin-top: 2px; }

  .crew-badge {
    background: var(--blue-light);
    color: #fff;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 6px;
  }
  .crew-badge .name { font-weight: 700; font-size: 1.05rem; }
  .crew-badge .boat { font-size: 0.82rem; opacity: 0.8; }
  .crew-badge .bet-chip {
    background: var(--gold);
    color: #1a1a1a;
    font-weight: 700;
    font-size: 0.82rem;
    padding: 4px 12px;
    border-radius: 99px;
  }

  main { max-width: 600px; margin: 0 auto; padding: 20px 16px 40px; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,.08);
  }
  .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 14px; color: var(--blue); }

  /* Bet form */
  .bet-form { display: flex; flex-direction: column; gap: 12px; }
  .bet-form p { font-size: 0.92rem; color: var(--muted); line-height: 1.5; }
  .input-row { display: flex; gap: 10px; }
  .input-row input {
    flex: 1;
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 1rem;
    outline: none;
    transition: border-color .2s;
  }
  .input-row input:focus { border-color: var(--blue-light); }

  .btn {
    background: var(--blue);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 11px 20px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--blue-light); }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sm { padding: 7px 14px; font-size: 0.85rem; }

  /* Status banner */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #fff8e6;
    border: 1px solid #f0c040;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: #7a5200;
    margin-bottom: 16px;
  }
  .status-bar.open { background: #edfdf4; border-color: #6bcf9f; color: #1a5c36; }
  .status-bar.closed { background: #fef0f0; border-color: #f0a0a0; color: #7a1a1a; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: #2d8a4e; }
  .dot.red { background: var(--red); }
  .dot.orange { background: var(--gold); }

  /* Race card */
  .race-item {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .race-item:last-child { margin-bottom: 0; }
  .race-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .race-title { font-weight: 700; font-size: 0.95rem; }
  .points-chip {
    font-size: 0.78rem;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 99px;
  }
  .points-3 { background: #d4edda; color: #1a5c36; }
  .points-1 { background: #fff3cd; color: #7a5200; }
  .points-0 { background: #f8d7da; color: #7a1a1a; }
  .points-null { background: #e9ecef; color: var(--muted); }

  .tip-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tip-row label { font-size: 0.85rem; color: var(--muted); white-space: nowrap; }
  .pos-select {
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 0.95rem;
    outline: none;
    cursor: pointer;
    background: #fff;
    transition: border-color .2s;
    min-width: 80px;
  }
  .pos-select:focus { border-color: var(--blue-light); }
  .pos-select:disabled { background: #f8f9fa; cursor: default; }

  .result-row {
    margin-top: 8px;
    font-size: 0.85rem;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .result-row span { display: flex; align-items: center; gap: 5px; }
  .lbl { color: var(--muted); }

  /* Score summary */
  .score-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    text-align: center;
  }
  .score-item { padding: 12px 8px; }
  .score-num { font-size: 2rem; font-weight: 800; color: var(--blue); line-height: 1; }
  .score-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 4px; }

  /* Loading / error */
  .spinner {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 60px 20px;
  }
  .spin {
    width: 40px; height: 40px;
    border: 4px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #fef0f0;
    border: 1.5px solid #f0a0a0;
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    color: #7a1a1a;
  }
  .error-box h3 { margin-bottom: 8px; }

  .no-races {
    text-align: center;
    padding: 30px 16px;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.6;
  }

  .save-msg {
    font-size: 0.8rem;
    color: var(--green);
    margin-left: 6px;
  }

  .leaderboard-link {
    display: block;
    text-align: center;
    padding: 12px;
    background: var(--blue);
    color: #fff;
    border-radius: var(--radius);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 16px;
  }
  .leaderboard-link:hover { background: var(--blue-light); }

  .countdown { font-weight: 700; }
</style>
</head>
<body>

<header>
  <h1>⛵ Pumps 2026</h1>
  <div class="sub">Tipovačka regaty</div>
</header>

<div id="crew-badge" style="display:none" class="crew-badge">
  <div>
    <div class="name" id="crew-name"></div>
    <div class="boat" id="crew-boat"></div>
  </div>
  <div class="bet-chip" id="crew-bet"></div>
</div>

<main>
  <div id="app">
    <div class="spinner"><div class="spin"></div></div>
  </div>
</main>

<script src="config.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
let crewData = null;

async function api(params) {
  const url = CFG.api + '?' + new URLSearchParams(params);
  const r = await fetch(url);
  return r.json();
}

function render(html) {
  document.getElementById('app').innerHTML = html;
}

function pos(n) {
  return n ? n + '. místo' : '—';
}

function pointsChip(p) {
  if (p === null || p === undefined) return '<span class="points-chip points-null">čeká se</span>';
  const cls = p === 3 ? 'points-3' : p === 1 ? 'points-1' : 'points-0';
  const lbl = p === 3 ? '🎯 +3 body' : p === 1 ? '±1 | +1 bod' : '0 bodů';
  return `<span class="points-chip ${cls}">${lbl}</span>`;
}

async function init() {
  if (!token) {
    render('<div class="error-box"><h3>Chybí token</h3><p>Použij odkaz, který jsi dostal od organizátora.</p></div>');
    return;
  }

  const today = new Date().toISOString().substring(0, 10);
  const data = await api({ action: 'tips', token, date: today });

  if (data.error) {
    render(`<div class="error-box"><h3>Chyba</h3><p>${data.error}</p></div>`);
    return;
  }

  crewData = data.crew;

  // Update header badge
  document.getElementById('crew-name').textContent = crewData.name;
  document.getElementById('crew-boat').textContent = '⛵ ' + crewData.boat;
  document.getElementById('crew-badge').style.display = 'flex';

  if (!crewData.bet) {
    renderBetForm();
    return;
  }

  document.getElementById('crew-bet').textContent = crewData.bet.toLocaleString('cs-CZ') + ' Kč';

  renderMain(data);
}

function renderBetForm() {
  render(`
    <div class="card">
      <h2>Zadat sázku</h2>
      <div class="bet-form">
        <p>Vítej, <strong>${crewData.name}</strong>! Nejdříve zadej svoji sázku.<br>
        Částku nelze po potvrzení změnit.</p>
        <div class="input-row">
          <input type="number" id="bet-input" min="1" placeholder="Částka v Kč" />
          <button class="btn" onclick="submitBet()">Potvrdit</button>
        </div>
        <div id="bet-msg" style="font-size:.85rem;color:var(--red)"></div>
      </div>
    </div>
  `);
}

async function submitBet() {
  const val = document.getElementById('bet-input').value;
  if (!val || +val <= 0) {
    document.getElementById('bet-msg').textContent = 'Zadej kladnou částku.';
    return;
  }
  const btn = document.querySelector('.btn');
  btn.disabled = true;
  btn.textContent = 'Ukládám…';

  const res = await api({ action: 'bet', token, amount: val });
  if (res.error) {
    document.getElementById('bet-msg').textContent = res.error;
    btn.disabled = false;
    btn.textContent = 'Potvrdit';
  } else {
    location.reload();
  }
}

function renderMain(data) {
  const { canTip, races } = data;
  const now = new Date();
  const hours = now.getHours();
  const mins = now.getMinutes();

  let statusHtml = '';
  if (canTip) {
    const secLeft = (12 * 3600) - (hours * 3600 + mins * 60 + now.getSeconds());
    const hLeft = Math.floor(secLeft / 3600);
    const mLeft = Math.floor((secLeft % 3600) / 60);
    statusHtml = `<div class="status-bar open">
      <div class="dot green"></div>
      Tipování otevřeno – zavírá se za <span class="countdown" id="cdwn">${hLeft}h ${mLeft}m</span>
    </div>`;
  } else {
    statusHtml = `<div class="status-bar closed">
      <div class="dot red"></div>
      Tipování uzavřeno (po 12:00). Výsledky se zobrazí jakmile je admin zadá.
    </div>`;
  }

  let racesHtml = '';
  if (races.length === 0) {
    racesHtml = `<div class="no-races">
      ${hours < 10
        ? '🕙 Admin zadá rozjízdy do 10:00.'
        : 'Dnes nejsou naplánované žádné rozjízdy.'}
    </div>`;
  } else {
    racesHtml = races.map(item => {
      const { race, tip, result, points } = item;
      const opts = Array.from({length: 16}, (_, i) => i + 1)
        .map(n => `<option value="${n}" ${tip === n ? 'selected' : ''}>${n}. místo</option>`)
        .join('');

      const resultRow = result
        ? `<div class="result-row">
            <span><span class="lbl">Tipoval jsi:</span> ${pos(tip)}</span>
            <span><span class="lbl">Výsledek:</span> ${pos(result)}</span>
           </div>`
        : tip ? `<div class="result-row"><span><span class="lbl">Tipoval jsi:</span> ${pos(tip)}</span></div>` : '';

      return `
        <div class="race-item">
          <div class="race-header">
            <div class="race-title">Rozjízda ${race.num}</div>
            ${pointsChip(points)}
          </div>
          <div class="tip-row">
            <label>Tvoje tipované pořadí:</label>
            <select class="pos-select" id="sel-${race.id}" onchange="saveTip('${race.id}', this)" ${canTip ? '' : 'disabled'}>
              <option value="">— vyber —</option>
              ${opts}
            </select>
            <span class="save-msg" id="msg-${race.id}"></span>
          </div>
          ${resultRow}
        </div>`;
    }).join('');
  }

  // Score summary
  const totalPts = data.races.reduce((s, r) => s + (r.points || 0), 0);
  const tipped = data.races.filter(r => r.tip).length;
  const exact = data.races.filter(r => r.points === 3).length;

  render(`
    <a class="leaderboard-link" href="leaderboard.html">🏆 Zobrazit celkové pořadí</a>

    ${statusHtml}

    <div class="card">
      <h2>Dnešní rozjízdy</h2>
      ${racesHtml}
    </div>

    <div class="card">
      <h2>Dnešní skóre</h2>
      <div class="score-grid">
        <div class="score-item">
          <div class="score-num">${totalPts}</div>
          <div class="score-lbl">bodů dnes</div>
        </div>
        <div class="score-item">
          <div class="score-num">${tipped}</div>
          <div class="score-lbl">tipů zadáno</div>
        </div>
        <div class="score-item">
          <div class="score-num">${exact}</div>
          <div class="score-lbl">přesných tipů</div>
        </div>
      </div>
    </div>
  `);

  if (canTip) startCountdown();
}

async function saveTip(raceId, sel) {
  const pos = sel.value;
  if (!pos) return;
  sel.disabled = true;
  const msg = document.getElementById('msg-' + raceId);
  msg.textContent = 'Ukládám…';
  msg.style.color = 'var(--muted)';

  const res = await api({ action: 'tip', token, race: raceId, pos });
  sel.disabled = false;
  if (res.error) {
    msg.textContent = res.error;
    msg.style.color = 'var(--red)';
  } else {
    msg.textContent = '✓ Uloženo';
    msg.style.color = 'var(--green)';
    setTimeout(() => { msg.textContent = ''; }, 2500);
  }
}

function startCountdown() {
  setInterval(() => {
    const el = document.getElementById('cdwn');
    if (!el) return;
    const now = new Date();
    const secs = (12 * 3600) - (now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds());
    if (secs <= 0) { location.reload(); return; }
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = secs % 60;
    el.textContent = h > 0 ? `${h}h ${m}m` : `${m}m ${s}s`;
  }, 1000);
}

init();
</script>
</body>
</html>
