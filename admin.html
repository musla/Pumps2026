<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⛵ Pumps 2026 – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--deep:#091622;--navy:#183558;--ocean:#1e5fa8;--gold:#c8a44a;--gold2:#f0d078;--foam:#ebf4f9;--white:#fff;--text:#162030;--muted:#647589;--border:#ccdde8;--green:#1e7a44;--red:#b83030;--sh:0 4px 18px rgba(9,22,34,.12);--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--foam);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(160deg,var(--deep),var(--navy) 55%,#204878);color:#fff;padding:24px 24px 56px;text-align:center;position:relative;overflow:hidden}
.hdr h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.badge{display:inline-block;background:var(--gold);color:var(--deep);font-weight:800;font-size:.72rem;padding:3px 12px;border-radius:99px;letter-spacing:.5px;margin-top:6px}
.wave{position:absolute;bottom:-1px;left:0;width:100%;line-height:0}
.wave svg{display:block;width:100%}
main{max-width:720px;margin:-26px auto 0;padding:0 14px 60px;position:relative;z-index:1}
.card{background:var(--white);border-radius:var(--r);padding:20px;margin-bottom:14px;box-shadow:var(--sh)}
.ctitle{font-family:'Playfair Display',serif;font-size:1.05rem;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.tabs{display:flex;background:#fff;border-radius:var(--r);padding:4px;margin-bottom:14px;box-shadow:var(--sh);gap:3px}
.tab{flex:1;padding:10px;text-align:center;font-size:.85rem;font-weight:700;color:var(--muted);border-radius:12px;cursor:pointer;border:none;background:none;transition:all .2s}
.tab.active{background:var(--navy);color:#fff}
.tp{display:none}.tp.active{display:block}
.row{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;margin-bottom:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:.8rem;font-weight:700;color:var(--muted);letter-spacing:.3px}
input,select{border:2px solid var(--border);border-radius:10px;padding:10px 13px;font-size:.95rem;outline:none;background:#fff;color:var(--text);transition:border-color .2s}
input:focus,select:focus{border-color:var(--ocean)}
input[type=number]{min-width:80px;width:auto}
input[type=date]{width:auto}
input[type=password]{width:auto;min-width:200px}
.btn{background:var(--navy);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:.92rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:background .15s,transform .1s}
.btn:hover{background:var(--ocean);transform:translateY(-1px)}.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-sm{padding:7px 13px;font-size:.82rem}
.btn-outline{background:none;border:2px solid var(--border);color:var(--navy);font-weight:700}
.btn-outline:hover{border-color:var(--ocean);background:var(--foam)}
.alert{padding:10px 14px;border-radius:var(--rs);font-size:.86rem;margin-top:8px}
.alert.ok{background:#e6f7ee;color:var(--green)}.alert.err{background:#fbeaea;color:var(--red)}
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:24px;gap:10px;color:var(--muted);font-size:.87rem}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--ocean);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.adm-tbl{width:100%;border-collapse:collapse;font-size:.85rem}
.adm-tbl th{background:var(--foam);padding:8px 10px;text-align:left;font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--navy);border-bottom:2px solid var(--border)}
.adm-tbl td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.adm-tbl tr:last-child td{border-bottom:none}
.adm-tbl select{padding:5px 8px;border-radius:6px;font-size:.85rem;border:1.5px solid var(--border);outline:none}
.tip-badge{background:#e6f7ee;color:var(--green);font-size:.68rem;font-weight:700;padding:2px 7px;border-radius:99px;margin-left:5px}
.lb-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.lb-item:last-child{border-bottom:none}
.lb-rank{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1rem;flex-shrink:0;background:var(--foam);color:var(--muted)}
.lb-rank.r1{background:linear-gradient(135deg,#ffd700,#e09800);color:#fff}
.lb-rank.r2{background:linear-gradient(135deg,#d8d8d8,#a0a0a0);color:#fff}
.lb-rank.r3{background:linear-gradient(135deg,#cd7f32,#9a5820);color:#fff}
.lb-info{flex:1;min-width:0}
.lb-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-meta{font-size:.76rem;color:var(--muted);margin-top:2px}
.lb-right{text-align:right;flex-shrink:0}
.lb-pts{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:900;color:var(--navy);line-height:1}
.lb-pl{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.prog{height:4px;background:var(--border);border-radius:99px;margin-top:5px;overflow:hidden}
.prog-f{height:100%;background:linear-gradient(90deg,var(--ocean),var(--gold));border-radius:99px}
.hidden{display:none}
.login-wrap{max-width:380px;margin:10px auto 0}
</style>
</head>
<body>
<header class="hdr">
  <h1>⛵ Pumps 2026</h1>
  <div><span class="badge">ADMIN PANEL</span></div>
  <div class="wave"><svg viewBox="0 0 1440 54" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none"><path d="M0,27 C240,52 480,2 720,27 C960,52 1200,2 1440,27 L1440,54 L0,54 Z" fill="#ebf4f9"/></svg></div>
</header>

<main>
  <div id="login-view">
    <div class="card login-wrap">
      <div class="ctitle">🔐 Přihlášení</div>
      <div class="field" style="margin-bottom:12px"><label>Admin klíč</label><input type="password" id="ki" placeholder="Heslo" onkeydown="if(event.key==='Enter')login()" /></div>
      <button class="btn" onclick="login()">Přihlásit →</button>
      <div id="le" class="alert err hidden"></div>
    </div>
  </div>

  <div id="panel" class="hidden">
    <div class="tabs">
      <button class="tab active" onclick="sw('races',this)">⛵ Rozjízdy</button>
      <button class="tab" onclick="sw('results',this)">📋 Výsledky</button>
      <button class="tab" onclick="sw('bets',this)">💰 Sázky</button>
      <button class="tab" onclick="sw('board',this)">🏆 Žebříček</button>
    </div>

    <div id="tp-races" class="tp active">
      <div class="card">
        <div class="ctitle">⛵ Nastavit rozjízdy (do 10:00)</div>
        <div class="row">
          <div class="field"><label>Datum</label><input type="date" id="rd" /></div>
          <div class="field"><label>Počet</label><input type="number" id="rc" min="1" max="10" value="3" /></div>
          <button class="btn" onclick="setRaces()">Uložit</button>
        </div>
        <div id="rm"></div>
      </div>
    </div>

    <div id="tp-results" class="tp">
      <div class="card">
        <div class="ctitle">📋 Zadat výsledky</div>
        <div class="row">
          <div class="field"><label>Datum</label><input type="date" id="resd" /></div>
          <button class="btn" onclick="loadDay()">Načíst</button>
        </div>
        <div id="ra"></div>
      </div>
    </div>

    <div id="tp-bets" class="tp">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="ctitle" style="margin:0">💰 Sázky posádek</div>
          <button class="btn btn-outline btn-sm" onclick="loadBets()">↻</button>
        </div>
        <div id="bta"><p style="color:var(--muted);font-size:.88rem">Přepni na záložku…</p></div>
      </div>
    </div>

    <div id="tp-board" class="tp">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div class="ctitle" style="margin:0">🏆 Průběžné pořadí</div>
          <button class="btn btn-outline btn-sm" onclick="loadBoard()">↻</button>
        </div>
        <div id="ba"><p style="color:var(--muted);font-size:.88rem">Přepni na záložku…</p></div>
      </div>
    </div>
  </div>
</main>

<script src="config.js"></script>
<script src="db.js"></script>
<script>
let KEY='';
const $=id=>document.getElementById(id);
const today=()=>new Date().toISOString().substring(0,10);

function msg(id,text,type){const e=$(id);if(!e)return;e.textContent=text;e.className='alert '+(type||'');e.classList.remove('hidden')}

async function login() {
  const key=$('ki').value.trim(); if(!key) return;
  try {
    const r=await adminGetDay(key,today());
    if(r.error){msg('le',r.error,'err');return;}
    KEY=key;
    $('login-view').classList.add('hidden');
    $('panel').classList.remove('hidden');
    $('rd').value=today(); $('resd').value=today();
  } catch(e){msg('le',e.message,'err');}
}

function sw(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active'); $('tp-'+name).classList.add('active');
  if(name==='board')loadBoard();
  if(name==='results')loadDay();
  if(name==='bets')loadBets();
}

async function setRaces(){
  const date=$('rd').value, count=+$('rc').value;
  if(!date||!count){msg('rm','Vyplň datum a počet.','err');return;}
  msg('rm','Ukládám…','');
  try{const r=await adminSetRaces(KEY,date,count);r.error?msg('rm',r.error,'err'):msg('rm',`✓ Nastaveno ${r.count} rozjízd na ${date}`,'ok');}
  catch(e){msg('rm',e.message,'err');}
}

async function loadDay(){
  const date=$('resd').value; if(!date)return;
  const ra=$('ra'); ra.innerHTML='<div class="spin-wrap"><div class="spinner"></div><span>Načítám…</span></div>';
  try{
    const d=await adminGetDay(KEY,date);
    if(d.error){ra.innerHTML=`<div class="alert err">${d.error}</div>`;return;}
    if(!d.races.length){ra.innerHTML='<p style="color:var(--muted);padding:12px 0;font-size:.88rem">Žádné rozjízdy. Nastav je v záložce Rozjízdy.</p>';return;}
    let html='';
    d.races.forEach(race=>{
      html+=`<h3 style="margin:16px 0 8px;font-size:.9rem;color:var(--navy);font-weight:700">Rozjízda ${race.num}</h3>`;
      html+=`<div style="overflow-x:auto"><table class="adm-tbl"><thead><tr><th>Posádka</th><th>Loď</th><th>Pořadí</th><th></th></tr></thead><tbody>`;
      d.crews.forEach(crew=>{
        const ex=d.results.find(r=>r.raceId===race.id&&r.crewId===crew.id);
        const ht=d.tips.some(t=>t.raceId===race.id&&t.crewId===crew.id);
        const opts=['<option value="">—</option>',
          ...Array.from({length:16},(_,i)=>i+1).map(n=>`<option value="${n}"${ex?.pos===n?' selected':''}>${n}.</option>`)
        ].join('');
        html+=`<tr><td><strong>${crew.name}</strong>${ht?'<span class="tip-badge">✓ tip</span>':''}</td><td style="color:var(--muted)">${crew.boat}</td>
          <td><select id="r-${race.id}-${crew.id}">${opts}</select></td>
          <td><button class="btn btn-sm" onclick="saveRes('${race.id}','${crew.id}')">Uložit</button>
          <span id="rm-${race.id}-${crew.id}" style="font-size:.78rem;margin-left:4px"></span></td></tr>`;
      });
      html+='</tbody></table></div>';
    });
    ra.innerHTML=html;
  }catch(e){ra.innerHTML=`<div class="alert err">${e.message}</div>`;}
}

async function saveRes(raceId,crewId){
  const pos=+$(`r-${raceId}-${crewId}`).value;
  const me=$(`rm-${raceId}-${crewId}`);
  if(!pos){me.textContent='Vyber pořadí';me.style.color='var(--red)';return;}
  me.textContent='…';me.style.color='var(--muted)';
  try{
    const r=await adminSetResult(KEY,raceId,crewId,pos);
    r.error?(me.textContent='✗ '+r.error,me.style.color='var(--red)'):(me.textContent='✓',me.style.color='var(--green)');
  }catch(e){me.textContent='✗';me.style.color='var(--red)';}
}

async function loadBets(){
  const bta=$('bta'); bta.innerHTML='<div class="spin-wrap"><div class="spinner"></div><span>Načítám…</span></div>';
  try{
    const d=await adminGetBets(KEY);
    if(d.error){bta.innerHTML=`<div class="alert err">${d.error}</div>`;return;}
    const total=d.crews.reduce((s,c)=>s+(c.bet||0),0);
    const potHtml=`<div style="background:linear-gradient(135deg,var(--deep),var(--navy));color:#fff;border-radius:var(--rs);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:.8rem;opacity:.7;text-transform:uppercase;letter-spacing:1px">Celkový pot</span>
      <span style="font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--gold)">${total.toLocaleString('cs-CZ')} Kč</span>
    </div>`;
    const rows=d.crews.map(c=>`
      <tr>
        <td><strong>${c.name}</strong></td>
        <td style="color:var(--muted);font-size:.82rem">${c.boat}</td>
        <td><input type="number" id="bet-${c.id}" value="${c.bet||''}" min="0" placeholder="—" style="width:110px;padding:6px 10px;font-size:.9rem;border:1.5px solid var(--border);border-radius:8px;outline:none" onfocus="this.style.borderColor='var(--ocean)'" onblur="this.style.borderColor='var(--border)'" /></td>
        <td>
          <button class="btn btn-sm" onclick="saveBet('${c.id}')">Uložit</button>
          <span id="bm-${c.id}" style="font-size:.78rem;margin-left:5px"></span>
        </td>
      </tr>`).join('');
    bta.innerHTML=potHtml+`<div style="overflow-x:auto"><table class="adm-tbl"><thead><tr><th>Posádka</th><th>Loď</th><th>Sázka (Kč)</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }catch(e){bta.innerHTML=`<div class="alert err">${e.message}</div>`;}
}

async function saveBet(crewId){
  const inp=$(`bet-${crewId}`), me=$(`bm-${crewId}`);
  me.textContent='…'; me.style.color='var(--muted)';
  try{
    const r=await adminSetBet(KEY,crewId,inp.value||'0');
    r.error?(me.textContent='✗ '+r.error,me.style.color='var(--red)'):(me.textContent='✓',me.style.color='var(--green)',setTimeout(()=>me.textContent='',2500));
  }catch(e){me.textContent='✗';me.style.color='var(--red)';}
}

async function loadBoard(){
  const ba=$('ba'); ba.innerHTML='<div class="spin-wrap"><div class="spinner"></div></div>';
  try{
    const d=await getLeaderboard(); if(d.error){ba.innerHTML=`<div class="alert err">${d.error}</div>`;return;}
    const max=d.board[0]?.pts||1;
    const pot=d.pot>0?`<div style="background:linear-gradient(135deg,var(--deep),var(--navy));color:#fff;border-radius:var(--r);padding:20px;text-align:center;margin-bottom:14px"><div style="font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;color:var(--gold)">${d.pot.toLocaleString('cs-CZ')} Kč</div><div style="font-size:.78rem;opacity:.65;margin-top:4px;letter-spacing:1px;text-transform:uppercase">celková výše sázek</div></div>`:'';
    const rows=d.board.map((c,i)=>{
      const rank=i+1,cls=rank<=3?' r'+rank:'',pct=Math.round((c.pts/max)*100);
      return `<div class="lb-item"><div class="lb-rank${cls}">${rank}</div>
        <div class="lb-info"><div class="lb-name">${c.name}</div>
          <div class="lb-meta">⛵ ${c.boat}${c.bet?' · 💰 '+Number(c.bet).toLocaleString('cs-CZ')+' Kč':''}</div>
          <div class="prog"><div class="prog-f" style="width:${pct}%"></div></div>
        </div>
        <div class="lb-right"><div class="lb-pts">${c.pts}</div><div class="lb-pl">bodů</div>
          <div style="font-size:.72rem;color:var(--muted);margin-top:2px">${c.exact}× přesně</div>
        </div></div>`;
    }).join('');
    ba.innerHTML=pot+(d.board.length?rows:'<p style="color:var(--muted);font-size:.88rem;text-align:center;padding:20px">Zatím žádná data.</p>');
  }catch(e){ba.innerHTML=`<div class="alert err">${e.message}</div>`;}
}
</script>
</body>
</html>
